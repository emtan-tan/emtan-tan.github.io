<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="description" content="A website to assist customers in 
    customizing their drink orders at coffee shops.">
    <title>Drink Customization Assist | Review</title>
    <link href="drink.css" rel="stylesheet">
</head>
<body>
    <div id="wrapper">
    <header>
        <h1>Drink Customization Assist</h1>
    </header>
    <nav>
         <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="basics.html">The Basics</a></li>
            <li><a href="modifiers.html">Modifier List</a></li>
            <li><a href="review.html">Leave Your Review</a></li>
         </ul>
      </nav>
    <main>
        <section id="review-input">
            <h2>Leave Us Your Review!</h2>
            <h3>Your Review Could Be Featured on the Home Page!</h3>
            <form method="post" action="form.html">
                <label for="FirstName">*First Name:</label>
                <input type="text" name="FirstName" id="FirstName" required="required">

                <label for="LastName">*Last Name:</label>
                <input type="text" name="LastName" id="LastName" required="required">

                <label for="Email">Email Address:</label>
                <input type="text" name="Email" id="Email">

                <label for="Phone">Phone Number:</label>
                <input type="number" name="Phone" id="Phone" maxlength="12">

                <label for="Drink">*Favorite Drink:</label>
                <input type="text" name="Drink" id="Drink" required="required">

                <label for="PublicReview">*Your Review:</label>
                <textarea name="PublicReview" id="PublicReview" rows="4" cols="30" required="required"></textarea>

                <label for="Comments">Additional Comments:</label>
                <textarea name="Comments" id="Comments" rows="4" cols="30"></textarea>

                <input type="submit" value="Submit">
            </form>
        </section>
    </main>
    <footer>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="https://www.starbucks.com/">Starbucks Website</a></li>
            <li><a href="mailto:emtan@asu.edu">Contact Us</a></li>
            <li>&copy; 2026 Drink Customization Assist <br><small>Last updated 4/14/2026</small></li>
        </ul>
    </footer>
    </div>
</body>
</html>
